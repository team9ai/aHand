name: Release Rust Binaries

on:
  push:
    tags:
      - "rust-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. rust-v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p ahandd -p ahandctl

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ahandd -p ahandctl

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p release
          EXT=""
          if [ "${{ runner.os }}" = "Windows" ]; then EXT=".exe"; fi
          cp "target/${{ matrix.target }}/release/ahandd$EXT" "release/ahandd-${{ matrix.suffix }}$EXT"
          cp "target/${{ matrix.target }}/release/ahandctl$EXT" "release/ahandctl-${{ matrix.suffix }}$EXT"
          cd release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "checksums-rust-${{ matrix.suffix }}.txt"
          else
            shasum -a 256 * > "checksums-rust-${{ matrix.suffix }}.txt"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust-${{ matrix.suffix }}
          path: release/

  universal:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download darwin-arm64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: rust-darwin-arm64
          path: arm64

      - name: Download darwin-x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: rust-darwin-x64
          path: x64

      - name: Create universal binaries
        run: |
          mkdir -p release
          lipo -create arm64/ahandd-darwin-arm64 x64/ahandd-darwin-x64 -output release/ahandd-darwin-universal
          lipo -create arm64/ahandctl-darwin-arm64 x64/ahandctl-darwin-x64 -output release/ahandctl-darwin-universal
          cd release && shasum -a 256 * > checksums-rust-darwin-universal.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust-darwin-universal
          path: release/

  release:
    needs: [build, universal]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd artifacts
          cat checksums-rust-*.txt > checksums-rust.txt
          rm checksums-rust-*-*.txt

      - name: Get tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          TAG="${TAG:-$GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*
          fail_on_unmatched_files: false
