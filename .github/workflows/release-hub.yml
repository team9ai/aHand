name: Release Hub Stack

on:
  push:
    tags:
      - "hub-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. hub-v0.1.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: hub
            image_name: ahand-hub
          - target: dashboard
            image_name: ahand-hub-dashboard
    runs-on: ubuntu-latest
    env:
      IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="$GITHUB_REF_NAME"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/hub/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
