name: Client CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      # TEMPORARY — remove before merge: lets CI run on the M1 branch pre-PR
      - feat/cross-platform-m1
  pull_request:
    paths:
      - "crates/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/client-ci.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt -p ahand-platform -p ahandd -p ahandctl --check

      - name: Clippy
        run: cargo clippy -p ahand-platform -p ahandd -p ahandctl --all-targets -- -D warnings

      - name: Test
        run: cargo test -p ahand-platform -p ahandd -p ahandctl --all-targets
