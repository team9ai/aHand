name: Client CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/cross-platform-m3  # TEMPORARY — remove before merge
  pull_request:
    paths:
      - "crates/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/client-ci.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt -p ahand-platform -p ahandd -p ahandctl --check

      - name: Clippy
        run: cargo clippy -p ahand-platform -p ahandd -p ahandctl --all-targets -- -D warnings

      - name: Test
        # --no-fail-fast: run every test binary even if one fails, so a single
        # CI round surfaces all platform-specific failures at once.
        run: cargo test -p ahand-platform -p ahandd -p ahandctl --all-targets --no-fail-fast

  browser-e2e:
    name: browser-e2e (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libssl-dev pkg-config

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build ahandd (debug)
        run: cargo build -p ahandd

      - name: browser-init (with retry on download flake)
        timeout-minutes: 12
        shell: bash
        run: |
          set +e
          if [ "$RUNNER_OS" = "Windows" ]; then
            AHANDD="target/debug/ahandd.exe"
          else
            AHANDD="target/debug/ahandd"
          fi

          echo "=== browser-init attempt 1 ==="
          "$AHANDD" browser-init
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "=== browser-init attempt 1 failed (exit $STATUS) — retrying once ==="
            "$AHANDD" browser-init --force
            STATUS=$?
          fi

          exit $STATUS

      - name: browser-doctor (assert healthy after init)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            AHANDD="target/debug/ahandd.exe"
          else
            AHANDD="target/debug/ahandd"
          fi

          OUTPUT=$("$AHANDD" browser-doctor 2>&1)
          STATUS=$?

          echo "$OUTPUT"

          if [ $STATUS -ne 0 ]; then
            echo "ERROR: browser-doctor exited with status $STATUS"
            exit 1
          fi

          # Assert healthy markers from browser_doctor::print_check output
          if ! echo "$OUTPUT" | grep -qF "Node.js:"; then
            echo "ERROR: doctor output missing 'Node.js:' marker"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qF "playwright-cli:"; then
            echo "ERROR: doctor output missing 'playwright-cli:' marker"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qF "System Browser:"; then
            echo "ERROR: doctor output missing 'System Browser:' marker"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qF "all checks passed"; then
            echo "ERROR: doctor output missing 'all checks passed'"
            exit 1
          fi
          # Also fail if any error marker is present in the output.
          if echo "$OUTPUT" | grep -qF "✗"; then
            echo "ERROR: doctor output contains '✗' (failed check)"
            exit 1
          fi
          if echo "$OUTPUT" | grep -qiF "Failed"; then
            echo "ERROR: doctor output contains 'Failed'"
            exit 1
          fi

          echo "=== browser-doctor: all assertions passed ==="

      - name: browser-init --force (pin force-reinstall path on real runners)
        timeout-minutes: 12
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            AHANDD="target/debug/ahandd.exe"
          else
            AHANDD="target/debug/ahandd"
          fi

          echo "=== browser-init --force ==="
          "$AHANDD" browser-init --force

      - name: browser-doctor (assert healthy after force re-init)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            AHANDD="target/debug/ahandd.exe"
          else
            AHANDD="target/debug/ahandd"
          fi

          OUTPUT=$("$AHANDD" browser-doctor 2>&1)
          STATUS=$?

          echo "$OUTPUT"

          if [ $STATUS -ne 0 ]; then
            echo "ERROR: browser-doctor exited with status $STATUS after force re-init"
            exit 1
          fi

          if ! echo "$OUTPUT" | grep -qF "Node.js:"; then
            echo "ERROR: doctor output missing 'Node.js:' after force re-init"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qF "playwright-cli:"; then
            echo "ERROR: doctor output missing 'playwright-cli:' after force re-init"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -qF "all checks passed"; then
            echo "ERROR: doctor output missing 'all checks passed' after force re-init"
            exit 1
          fi
          # Also fail if any error marker is present.
          if echo "$OUTPUT" | grep -qF "✗"; then
            echo "ERROR: doctor output contains '✗' after force re-init"
            exit 1
          fi
          if echo "$OUTPUT" | grep -qiF "Failed"; then
            echo "ERROR: doctor output contains 'Failed' after force re-init"
            exit 1
          fi

          echo "=== browser-doctor (post-force): all assertions passed ==="
