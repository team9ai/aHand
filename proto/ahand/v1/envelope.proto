syntax = "proto3";

package ahand.v1;

import "ahand/v1/browser.proto";
import "ahand/v1/file_ops.proto";

// Envelope wraps all messages on the wire (WS and IPC).
message Envelope {
  string device_id = 1;
  string trace_id  = 2;
  string msg_id    = 3;
  uint64 seq       = 4;
  uint64 ack       = 5;
  uint64 ts_ms     = 6;

  oneof payload {
    HelloChallenge   hello_challenge   = 9;
    Hello            hello             = 10;
    JobRequest       job_request       = 11;
    JobEvent         job_event         = 12;
    JobFinished      job_finished      = 13;
    JobRejected      job_rejected      = 14;
    CancelJob        cancel_job        = 15;
    ApprovalRequest  approval_request  = 16;
    ApprovalResponse approval_response = 17;
    PolicyQuery      policy_query      = 18;  // reserved for Mode 5 (preset)
    PolicyState      policy_state      = 19;  // reserved for Mode 5 (preset)
    PolicyUpdate     policy_update     = 20;  // reserved for Mode 5 (preset)
    SetSessionMode   set_session_mode  = 21;
    SessionState     session_state     = 22;
    SessionQuery     session_query     = 23;
    BrowserRequest   browser_request   = 24;
    BrowserResponse  browser_response  = 25;
    HelloAccepted    hello_accepted    = 26;
    UpdateCommand    update_command    = 27;
    UpdateStatus     update_status     = 28;
    StdinChunk       stdin_chunk       = 29;
    TerminalResize   terminal_resize   = 30;
    Heartbeat        heartbeat         = 31;
    // Tag 32 is intentionally skipped: PR #1 (c9b8a4d, 2026-04-28)
    // briefly assigned `FileResponse = 32` on `dev` and shifted
    // Heartbeat to 33, breaking wire compat with deployed daemons.
    // Don't reuse 32 even though no client ever decoded it correctly —
    // a hub built between c9b8a4d and the fix will emit/parse it.
    FileRequest      file_request      = 33;
    FileResponse     file_response     = 34;
  }
}

// Heartbeat — periodic keep-alive sent from daemon to hub over the existing
// WebSocket. The hub forwards each heartbeat as a `device.heartbeat` webhook
// event and uses its arrival to refresh TTL-based presence state.
message Heartbeat {
  uint64 sent_at_ms    = 1;
  string daemon_version = 2;
}

// HelloChallenge - server nonce that must be signed in the initial Hello response.
message HelloChallenge {
  bytes nonce = 1;
  uint64 issued_at_ms = 2;
}

// Hello - initial handshake after WS connection.
message HelloAccepted {
  string            auth_method        = 1;
  UpdateSuggestion  update_suggestion  = 2;  // optional — server may suggest an update
}

// Hello - initial handshake after WS connection.
message Hello {
  string version    = 1;
  string hostname   = 2;
  string os         = 3;
  repeated string capabilities = 4;
  uint64 last_ack   = 5;  // on reconnect, the highest seq received from peer
  reserved 7;
  reserved "bearer_token";

  oneof auth {
    Ed25519Auth ed25519 = 6;
    BootstrapAuth bootstrap = 8;
  }
}

message Ed25519Auth {
  bytes public_key = 1;
  bytes signature = 2;
  uint64 signed_at_ms = 3;
}

message BootstrapAuth {
  string bearer_token = 1;
  bytes public_key = 2;
  bytes signature = 3;
  uint64 signed_at_ms = 4;
}

// JobRequest - cloud asks local to execute a tool.
message JobRequest {
  string job_id = 1;
  string tool   = 2;  // executable name, e.g. "rg", "git"
  repeated string args = 3;
  string cwd    = 4;
  map<string, string> env = 5;
  uint64 timeout_ms = 6;
  bool   interactive = 7;  // request a PTY / interactive session
}

// JobEvent - streaming output from a running job.
message JobEvent {
  string job_id = 1;

  oneof event {
    bytes  stdout_chunk = 2;
    bytes  stderr_chunk = 3;
    uint32 progress     = 4;  // 0-100
  }
}

// JobFinished - job completed (success or failure).
message JobFinished {
  string job_id    = 1;
  int32  exit_code = 2;
  string error     = 3;  // empty on success
}

// JobRejected - local policy rejected the job.
message JobRejected {
  string job_id = 1;
  string reason = 2;
}

// CancelJob - request to cancel a running job.
message CancelJob {
  string job_id = 1;
}

// ApprovalRequest - daemon asks user to approve a job (strict mode).
message ApprovalRequest {
  string job_id  = 1;
  string tool    = 2;
  repeated string args = 3;
  string cwd     = 4;
  string reason  = 5;
  repeated string detected_domains = 6;
  uint64 expires_ms  = 7;  // absolute timestamp when this request expires
  string caller_uid  = 8;  // who submitted the job (IPC="uid:N", WS="cloud")
  repeated RefusalContext previous_refusals = 9;  // recent refusals for the same tool (24h context)
}

// ApprovalResponse - user responds to an approval request.
message ApprovalResponse {
  string job_id   = 1;
  bool   approved = 2;
  bool   remember = 3;  // reserved for Mode 5 (preset)
  string reason   = 4;  // refusal reason (stored for 24h as context)
}

// PolicyQuery - request the current policy configuration.
message PolicyQuery {}

// PolicyState - snapshot of the current policy (response to query or update).
message PolicyState {
  repeated string allowed_tools = 1;
  repeated string denied_tools  = 2;
  repeated string denied_paths  = 3;
  repeated string allowed_domains = 4;
  uint64 approval_timeout_secs = 5;
}

// PolicyUpdate - incremental policy modification. Empty lists = no change.
// Reserved for Mode 5 (preset).
message PolicyUpdate {
  repeated string add_allowed_tools      = 1;
  repeated string remove_allowed_tools   = 2;
  repeated string add_denied_tools       = 3;
  repeated string remove_denied_tools    = 4;
  repeated string add_allowed_domains    = 5;
  repeated string remove_allowed_domains = 6;
  repeated string add_denied_paths       = 7;
  repeated string remove_denied_paths    = 8;
  uint64 approval_timeout_secs = 9;  // 0 = don't change
}

// ── Session Mode System ─────────────────────────────────────────

// Session mode controls how commands from a specific caller are handled.
enum SessionMode {
  SESSION_MODE_INACTIVE    = 0;  // default — reject all, prompt user to activate
  SESSION_MODE_STRICT      = 1;  // every command requires manual approval
  SESSION_MODE_TRUST       = 2;  // auto-approve, with inactivity timeout
  SESSION_MODE_AUTO_ACCEPT = 3;  // auto-approve, no timeout
}

// SetSessionMode - set the mode for a specific caller (cloud → daemon).
message SetSessionMode {
  string caller_uid        = 1;
  SessionMode mode         = 2;
  uint64 trust_timeout_mins = 3;  // 0 = use default (60 min)
}

// SessionState - current session state for a caller (daemon → cloud).
message SessionState {
  string caller_uid        = 1;
  SessionMode mode         = 2;
  uint64 trust_expires_ms  = 3;  // absolute timestamp, 0 = not applicable
  uint64 trust_timeout_mins = 4;
}

// SessionQuery - request session state (cloud → daemon).
message SessionQuery {
  string caller_uid = 1;  // empty = query all sessions
}

// RefusalContext - context from a recent refusal of the same tool.
message RefusalContext {
  string tool          = 1;
  string reason        = 2;
  uint64 refused_at_ms = 3;
}

// ── Auto-Update System ──────────────────────────────────────────

// UpdateState — lifecycle state of an in-progress or completed update.
enum UpdateState {
  UPDATE_STATE_PENDING     = 0;  // update queued, not yet started
  UPDATE_STATE_DOWNLOADING = 1;  // binary is being fetched
  UPDATE_STATE_VERIFYING   = 2;  // checksum / signature check
  UPDATE_STATE_INSTALLING  = 3;  // installing new binary
  UPDATE_STATE_RESTARTING  = 4;  // process replacing itself
  UPDATE_STATE_COMPLETED   = 5;  // update complete, new version running
  UPDATE_STATE_FAILED      = 6;  // update failed — see error field
}

// UpdateSuggestion — server hints that a newer version is available (hub → daemon).
message UpdateSuggestion {
  string update_id        = 1;
  string target_version   = 2;
  string download_url     = 3;
  string checksum_sha256  = 4;
  bytes  signature        = 5;
  string release_notes    = 6;
}

// UpdateCommand — server instructs daemon to apply an update (hub → daemon).
message UpdateCommand {
  string update_id        = 1;
  string target_version   = 2;
  string download_url     = 3;
  string checksum_sha256  = 4;
  bytes  signature        = 5;
  uint32 max_retries      = 6;
}

// UpdateStatus — daemon reports update progress back to hub (daemon → hub).
message UpdateStatus {
  string      update_id       = 1;
  UpdateState state           = 2;
  string      current_version = 3;
  string      target_version  = 4;
  uint32      progress        = 5;  // 0-100
  string      error           = 6;  // non-empty on FAILED
}

// ── Interactive / PTY Support ───────────────────────────────────

// StdinChunk — sends a chunk of stdin data to a running interactive job.
message StdinChunk {
  string job_id = 1;
  bytes  data   = 2;
}

// TerminalResize — notifies the daemon of a terminal size change for a PTY job.
message TerminalResize {
  string job_id = 1;
  uint32 cols   = 2;
  uint32 rows   = 3;
}
