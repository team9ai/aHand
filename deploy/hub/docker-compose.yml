name: ahand-hub

services:
  hub:
    build:
      context: ../..
      dockerfile: deploy/hub/Dockerfile
      target: hub
    image: ahand-hub:local
    environment:
      AHAND_HUB_BIND_ADDR: 0.0.0.0:8080
      AHAND_HUB_SERVICE_TOKEN: ${AHAND_HUB_SERVICE_TOKEN:?set AHAND_HUB_SERVICE_TOKEN}
      AHAND_HUB_DASHBOARD_PASSWORD: ${AHAND_HUB_DASHBOARD_PASSWORD:?set AHAND_HUB_DASHBOARD_PASSWORD}
      AHAND_HUB_DEVICE_BOOTSTRAP_TOKEN: ${AHAND_HUB_DEVICE_BOOTSTRAP_TOKEN:?set AHAND_HUB_DEVICE_BOOTSTRAP_TOKEN}
      AHAND_HUB_DEVICE_BOOTSTRAP_DEVICE_ID: ${AHAND_HUB_DEVICE_BOOTSTRAP_DEVICE_ID:?set AHAND_HUB_DEVICE_BOOTSTRAP_DEVICE_ID}
      AHAND_HUB_DASHBOARD_ALLOWED_ORIGINS: ${AHAND_HUB_DASHBOARD_ALLOWED_ORIGINS:-}
      AHAND_HUB_JWT_SECRET: ${AHAND_HUB_JWT_SECRET:?set AHAND_HUB_JWT_SECRET}
      AHAND_HUB_DATABASE_URL: ${AHAND_HUB_DATABASE_URL:?set AHAND_HUB_DATABASE_URL}
      AHAND_HUB_REDIS_URL: ${AHAND_HUB_REDIS_URL:?set AHAND_HUB_REDIS_URL}
      AHAND_HUB_AUDIT_RETENTION_DAYS: ${AHAND_HUB_AUDIT_RETENTION_DAYS:-90}
      AHAND_HUB_AUDIT_FALLBACK_PATH: ${AHAND_HUB_AUDIT_FALLBACK_PATH:-/var/lib/ahand-hub/audit-fallback.jsonl}
    ports:
      - "8080:8080"
    volumes:
      - hub-audit-data:/var/lib/ahand-hub
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/hub/Dockerfile
      target: dashboard
    image: ahand-hub-dashboard:local
    depends_on:
      hub:
        condition: service_healthy
    environment:
      AHAND_HUB_BASE_URL: http://hub:8080
      NODE_ENV: production
    ports:
      - "3100:3100"

volumes:
  hub-audit-data:
